<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4-Filter AI Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #FFFFFF; color: #111111; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

  .mono { font-family: 'DM Mono', monospace; }

  header {
    padding: 28px 40px 22px;
    border-bottom: 1px solid #E8E8E8;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 12px;
    background: #FFFFFF;
  }
  .header-eyebrow { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.35em; color: #999; margin-bottom: 8px; text-transform: uppercase; }
  .header-title { font-size: clamp(22px, 3.5vw, 34px); font-weight: 700; letter-spacing: -0.03em; line-height: 1.1; color: #111; }
  .header-sub { font-family: 'DM Mono', monospace; font-size: 12px; color: #AAA; margin-top: 8px; }
  .header-credit { font-family: 'DM Mono', monospace; font-size: 11px; color: #BBB; text-align: right; line-height: 1.8; }

  .tabs { display: flex; border-bottom: 1px solid #E8E8E8; overflow-x: auto; background: #FAFAFA; }
  .tab {
    flex: 1; min-width: 110px; padding: 16px 22px;
    background: none; border: none;
    border-bottom: 3px solid transparent;
    border-right: 1px solid #E8E8E8;
    cursor: pointer; text-align: left;
    transition: all 0.2s;
  }
  .tab:last-child { border-right: none; }
  .tab.active { border-bottom-color: var(--c); background: #FFFFFF; }
  .tab-num { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.25em; color: #CCC; margin-bottom: 5px; transition: color 0.2s; }
  .tab.active .tab-num { color: var(--c); }
  .tab-name { font-size: clamp(12px, 1.8vw, 15px); font-weight: 600; color: #BBB; letter-spacing: 0.01em; transition: color 0.2s; }
  .tab.active .tab-name { color: #111; }

  .grid {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 1px;
    background: #E8E8E8;
  }
  .cell { background: #FFFFFF; padding: 32px 36px; }
  .cell-bottom { border-top: 1px solid #F0F0F0; }
  .cell-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.35em; color: #BBB; margin-bottom: 18px; text-transform: uppercase; }

  .question { font-size: clamp(14px, 1.8vw, 18px); line-height: 1.7; color: #222; font-style: italic; font-weight: 300; border-left: 3px solid var(--c); padding-left: 20px; }
  .tag-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 28px; }
  .tag { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; padding: 4px 12px; border-radius: 3px; font-weight: 500; }
  .sub-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.3em; color: #BBB; margin-top: 28px; margin-bottom: 10px; text-transform: uppercase; }
  .sub-value { font-family: 'DM Mono', monospace; font-size: 13px; color: #888; }

  .elements { display: flex; flex-direction: column; gap: 12px; }
  .element { padding: 16px 18px; background: #FAFAFA; border: 1px solid #EFEFEF; border-left: 3px solid var(--cl); }
  .el-num { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; color: var(--c); margin-bottom: 6px; font-weight: 500; }
  .el-desc { font-family: 'DM Mono', monospace; font-size: 12px; color: #888; line-height: 1.6; }

  .rule-box { padding: 14px 18px; font-family: 'DM Mono', monospace; font-size: 12px; color: #555; line-height: 1.7; margin-bottom: 22px; border-radius: 2px; }
  .rule-icon { margin-right: 8px; }
  .do-dont { display: flex; flex-direction: column; gap: 14px; }
  .do-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.2em; font-weight: 600; }
  .do-text { font-size: 13px; color: #777; line-height: 1.6; font-style: italic; margin-top: 6px; }

  .example-box { padding: 22px 24px; border: 1px solid #EFEFEF; background: #FAFAFA; border-radius: 2px; }
  .example-tag { display: inline-block; font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.2em; padding: 3px 10px; font-weight: 600; margin-bottom: 16px; color: #FFFFFF; border-radius: 2px; }
  .example-text { font-size: 14px; color: #666; line-height: 1.75; font-style: italic; font-weight: 300; }

  .bottom-nav { border-top: 1px solid #E8E8E8; display: grid; grid-template-columns: repeat(4, 1fr); background: #FAFAFA; }
  .nav-item { padding: 14px 20px; border-right: 1px solid #E8E8E8; cursor: pointer; opacity: 0.35; transition: all 0.2s; border-top: 2px solid transparent; }
  .nav-item:last-child { border-right: none; }
  .nav-item.active { opacity: 1; border-top-color: var(--c); background: #FFFFFF; }
  .nav-num { font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 0.3em; margin-bottom: 4px; }
  .nav-name { font-size: 12px; color: #333; letter-spacing: 0.02em; font-weight: 600; }

  @media (max-width: 600px) {
    .cell { padding: 22px 20px; }
    header { padding: 20px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="header-eyebrow">Product Strategy Framework</div>
    <h1 class="header-title">The 4-Filter AI Roadmap</h1>
    <p class="header-sub">Vision &rarr; Outcomes &rarr; Bets &rarr; Delivery</p>
  </div>
  <div class="header-credit">
    <div style="color:#333;font-weight:500">Carlos Oliveira</div>
    <div>Product Pirates</div>
  </div>
</header>

<div class="tabs" id="tabs"></div>
<div class="grid" id="grid"></div>
<div class="bottom-nav" id="bottomNav"></div>

<script>
const filters = [
  {
    number: "01", title: "VISION", color: "#C9920A",
    subtitle: "Where are we going?",
    audience: [["CFO","#C9920A"],["CEO","#C9920A"],["Board","#C9920A"]],
    question: "What does business success look like in 12 months — in terms a CFO and a customer both understand?",
    rule: 'If the word "AI" appears in your vision, rewrite it. AI is how you get there, not where you\'re going.',
    elements: [
      { label: "Business Outcome", desc: "One sentence. Measurable. No tech jargon." },
      { label: "User Experience Change", desc: "One sentence. What is different for them?" },
    ],
    example: { tag: "Duolingo Max", text: "Give every learner access to the kind of practice that used to require a human tutor." },
    do: "Write the destination, not the vehicle.",
    dont: '"Integrate GPT-4" or "Become an AI-first company."',
  },
  {
    number: "02", title: "OUTCOMES", color: "#1A8C5E",
    subtitle: "How do we know it's working?",
    audience: [["Product","#1A8C5E"],["Data","#1A8C5E"],["Exec","#888"]],
    question: "Is the AI changing user behavior in ways that create business value?",
    rule: "Model accuracy is not an outcome. Behavior change is.",
    elements: [
      { label: "Behavior Metric", desc: "What user action changes? (acceptance rate, retention, task completion)" },
      { label: "Success Range", desc: "Respect probabilistic reality. Give a floor and ceiling." },
      { label: "Quality Floor", desc: "Define the failure condition, not just the win." },
    ],
    example: { tag: "GitHub Copilot", text: "Tracked developer code acceptance rate + retention vs. non-Copilot users — not model precision." },
    do: '"10-20% conversion lift for users who engage 3+ recs. Success = 10%+ with less than 8% irrelevance reports."',
    dont: '"AI recommendations will increase conversion by 15%."',
  },
  {
    number: "03", title: "BETS", color: "#C94F2A",
    subtitle: "What must be true for this to work?",
    audience: [["Eng","#C94F2A"],["ML","#C94F2A"],["PM","#C94F2A"]],
    question: "Which AI capabilities are we committing to — and what assumptions would kill them?",
    rule: "A bet without assumptions is a wish. Writing assumptions converts unrealistic roadmaps into productive conversations.",
    elements: [
      { label: "The Bet", desc: '"We believe AI can do X"' },
      { label: "The Assumption", desc: '"This only works if Y is true"' },
      { label: "The Validation", desc: '"We will know by doing Z"' },
    ],
    example: { tag: "Spotify AI DJ", text: "Bet: mood-matched audio beats manual playlists for ambient listening. Assumption: users relinquish control. Validated with years of behavioral data before launch." },
    do: "Write all three (Bet / Assumption / Validation) for every capability. If you can't, don't commit it.",
    dont: "Skip this layer. It's where most roadmaps fail silently.",
  },
  {
    number: "04", title: "DELIVERY", color: "#3A5FC4",
    subtitle: "What ships — and what do we learn?",
    audience: [["Eng","#C94F2A"],["Design","#3A5FC4"],["Exec","#888"]],
    question: "What question are we answering in each 30-day cycle?",
    rule: "Every line in your 30/60/90 plan needs a shipping commitment AND a learning commitment.",
    elements: [
      { label: "What Ships (30/60/90)", desc: "Incremental releases, not big bangs." },
      { label: "What We Learn", desc: '"By end of this cycle, we will know _____."' },
      { label: "Decision Point", desc: "Expand, pivot, or rethink based on data." },
    ],
    example: { tag: "Notion AI", text: "Shipped text gen then editing commands then summaries. Each release shaped the next. The roadmap was a learning sequence, not a feature list." },
    do: "Budget explicit cycles for model retraining. Feedback loops are structural, not optional.",
    dont: "Ship once and move on. Model drift is silent and slow.",
  },
];

let active = 0;

function hex2rgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function renderTabs() {
  document.getElementById('tabs').innerHTML = filters.map((f, i) => `
    <button class="tab ${i===active?'active':''}" style="--c:${f.color}" onclick="setActive(${i})">
      <div class="tab-num">${f.number} FILTER</div>
      <div class="tab-name">${f.title}</div>
    </button>
  `).join('');
}

function renderGrid() {
  const f = filters[active];
  const c = f.color;
  const cl = hex2rgba(c, 0.25);
  const cb = hex2rgba(c, 0.18);
  const cbg = hex2rgba(c, 0.05);

  document.getElementById('grid').innerHTML = `
    <div class="cell" style="--c:${c};--cl:${cl}">
      <div class="cell-label">Core Question</div>
      <p class="question">"${f.question}"</p>
      <div class="sub-label">Audience</div>
      <div class="tag-row">
        ${f.audience.map(([a,ac]) => `<span class="tag" style="background:${hex2rgba(ac,0.08)};color:${ac};border:1px solid ${hex2rgba(ac,0.18)}">${a}</span>`).join('')}
      </div>
      <div class="sub-label">Focus</div>
      <div class="sub-value">${f.subtitle}</div>
    </div>

    <div class="cell" style="--c:${c};--cl:${cl}">
      <div class="cell-label">Key Elements</div>
      <div class="elements">
        ${f.elements.map((el,i) => `
          <div class="element">
            <div class="el-num">${String(i+1).padStart(2,'0')} — ${el.label.toUpperCase()}</div>
            <div class="el-desc">${el.desc}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="cell cell-bottom" style="--c:${c}">
      <div class="cell-label">The Rule</div>
      <div class="rule-box" style="border:1px solid ${cb};background:${cbg}">
        <span class="rule-icon" style="color:${c}">⚠</span>${f.rule}
      </div>
      <div class="do-dont">
        <div>
          <div class="do-label" style="color:#1A8C5E">✓ DO</div>
          <div class="do-text">${f.do}</div>
        </div>
        <div>
          <div class="do-label" style="color:#C94F2A">✗ DON'T</div>
          <div class="do-text">${f.dont}</div>
        </div>
      </div>
    </div>

    <div class="cell cell-bottom" style="--c:${c}">
      <div class="cell-label">Real-World Example</div>
      <div class="example-box">
        <div class="example-tag" style="background:${c}">${f.example.tag.toUpperCase()}</div>
        <p class="example-text">"${f.example.text}"</p>
      </div>
    </div>
  `;
}

function renderBottomNav() {
  document.getElementById('bottomNav').innerHTML = filters.map((f, i) => `
    <div class="nav-item ${i===active?'active':''}" style="--c:${f.color}" onclick="setActive(${i})">
      <div class="nav-num mono" style="color:${f.color}">${f.number}</div>
      <div class="nav-name">${f.title}</div>
    </div>
  `).join('');
}

function setActive(i) {
  active = i;
  renderTabs();
  renderGrid();
  renderBottomNav();
}

renderTabs();
renderGrid();
renderBottomNav();
</script>
</body>
</html>
